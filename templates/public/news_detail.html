{% extends "base.html" %}

{% block title %}{{ post.title }} | Yasana ko Lau{% endblock %}

{% block content %}
<article class="max-w-3xl mx-auto px-4 py-12">
  <a href="{% url 'public:news_list' %}" class="text-sm font-semibold text-lau-ocean">Back to news</a>
  <p class="mt-6 text-xs font-semibold uppercase text-lau-muted">{{ post.published_at|date:"d M Y" }}</p>
  <h1 class="mt-3 font-display text-4xl text-lau-navy">{{ post.title }}</h1>
  <div class="masi-divider my-6" aria-hidden="true"></div>
  <div class="prose max-w-none leading-8 text-gray-800 whitespace-pre-line">{{ post.body }}</div>
</article>
{% endblock %}
