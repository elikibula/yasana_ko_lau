{% extends "base.html" %}

{% block title %}Delete Event | Yasana ko Lau{% endblock %}

{% block content %}
<section class="max-w-xl mx-auto px-4 py-10">
  <form method="post" class="rounded-md bg-lau-white p-6 shadow-sm">
    {% csrf_token %}
    <h1 class="font-display text-3xl text-lau-navy">Delete event?</h1>
    <p class="mt-3 text-gray-700">This will permanently delete "{{ object.title }}".</p>
    <div class="mt-6 flex gap-3">
      <button class="rounded-md bg-red-700 px-5 py-3 font-semibold text-white" type="submit">Delete</button>
      <a class="rounded-md border border-lau-gold px-5 py-3 font-semibold text-lau-earth" href="{% url 'events:manage' %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
